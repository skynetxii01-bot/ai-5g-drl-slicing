env:
  total_prbs: 25
  step_interval_s: 0.1
  episode_steps: 1000
  seed_train: 42
  seed_eval: 99

agents:
  dqn:
    lr: 0.001
    gamma: 0.99
    batch_size: 64
    buffer_size: 50000
    tau: 0.005
  ppo:
    lr: 0.0003
    gamma: 0.99
    lambda_gae: 0.95
    eps_clip: 0.2
    n_steps: 2048
  r2d2:
    lr: 0.0001
    gamma: 0.99
    batch_size: 32
    seq_len: 40
    burn_in: 40
    n_step: 5
